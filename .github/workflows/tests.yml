name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────
  # Unit tests — fast, mocked, no API key
  # ──────────────────────────────────────
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: openfaust

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: openfaust/requirements*.txt

      - name: Install dependencies
        working-directory: openfaust
        run: |
          pip install --no-cache-dir -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        working-directory: openfaust
        env:
          OPENROUTER_API_KEY: ***
          DISCORD_TOKEN: ***
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_integration_flow.py \
            --tb=long

  # ──────────────────────────────────────
  # Integration tests — container-based
  # ──────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4

      - name: Build test runner image
        run: docker build -t openfaust-test:latest -f Dockerfile.test .

      - name: Run integration tests
        run: docker run --rm openfaust-test:latest

  # ──────────────────────────────────────
  # Full pipeline — requires API key
  # ──────────────────────────────────────
  full-pipeline:
    runs-on: ubuntu-latest
    needs: [unit]
    if: ${{ secrets.OPENROUTER_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build test runner image
        run: docker build -t openfaust-test:latest -f Dockerfile.test .

      - name: Run full pipeline tests
        run: docker run --rm -e OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }} \
          openfaust-test:latest \
          sh -c "python -m pytest tests/test_integration_flow.py -v -k 'Pipeline' --tb=long"
