name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 1. Unit tests (Fast, Mocked)
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: openfaust
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        working-directory: openfaust
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run unit tests
        working-directory: openfaust
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python -m pytest tests/ -v --ignore=tests/test_integration_flow.py

  # 2. Integration tests (Container-based)
  integration:
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - name: Build test runner image
        run: docker build -t openfaust-test:latest -f Dockerfile.test .
      - name: Run integration tests
        run: docker run --rm openfaust-test:latest pytest tests/test_integration_flow.py -v -k "not Pipeline"

  # 3. Full pipeline (Requires API key)
  check-secret:
    runs-on: ubuntu-latest
    outputs:
      has_key: ${{ steps.check.outputs.has_key }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.OPENROUTER_API_KEY }}" ]; then
            echo "has_key=true" >> $GITHUB_OUTPUT
          else
            echo "has_key=false" >> $GITHUB_OUTPUT
          fi

  # ──────────────────────────────────────
  # Full pipeline — requires API key
  # ──────────────────────────────────────
  full-pipeline:
    runs-on: ubuntu-latest
    needs: [unit, check-secret]
    if: needs.check-secret.outputs.has_key == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Build test runner image
        run: docker build -t openfaust-test:latest -f Dockerfile.test .
      - name: Run full pipeline tests
        run: |
          docker run --rm -e OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }} \
          openfaust-test:latest \
          sh -c "python -m pytest tests/test_integration_flow.py -v -k 'Pipeline' --tb=long"